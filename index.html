<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="img/WhatsApp Image 2026-02-05 at 10.08.03.jpg" />
    <title>Info House</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <img src="img/WhatsApp Image 2026-02-05 at 10.08.03.jpg" alt="Logo Info House" />
      <h1>Info House</h1>
      <p>Sistema de Gerenciamento</p>
    </header>

    <nav>
      <button id="btn-nav-pecas" class="ativo" onclick="mostrarAba('pecas')">📦 Controle de Peças</button>
      <button id="btn-nav-os" onclick="mostrarAba('os')">🛠️ Ordens de Serviço</button>
    </nav>

    <div class="container">

      <!-- ===== ABA PEÇAS ===== -->
      <div id="aba-pecas">
        <div class="card">
          <h2>📦 Novo Pedido de Peça</h2>
          <div class="form-grid">
            <div class="field"><label>Nome do cliente *</label><input id="nome" placeholder="Ex: João Silva" /></div>
            <div class="field"><label>Telefone / WhatsApp</label><input id="telefone" placeholder="(xx) 9xxxx-xxxx" /></div>
            <div class="field"><label>Data</label><input id="data" type="date" /></div>
            <div class="field"><label>Tipo da peça</label><input id="tipo" placeholder="Ex: Tela, Bateria, Fonte..." /></div>
            <div class="field"><label>Modelo *</label><input id="modelo" placeholder="Ex: iPhone 14, A32 5G..." /></div>
            <div class="field">
              <label>Status</label>
              <select id="status">
                <option value="Pedido realizado">Pedido realizado</option>
                <option value="Peça em trânsito">Peça em trânsito</option>
                <option value="Peça chegou">Peça chegou</option>
                <option value="Entregue ao cliente">Entregue ao cliente</option>
              </select>
            </div>
            <div class="field" style="grid-column: 1/-1"><label>Observações</label><textarea id="obs" placeholder="Informações adicionais..."></textarea></div>
          </div>
          <div class="form-actions">
            <button onclick="salvarPedido()">💾 Salvar Pedido</button>
            <button class="btn-secondary" onclick="limparFormPeca()">✕ Limpar</button>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>📋 Pedidos Cadastrados</h2>
          </div>
          <div class="search-wrap">
            <input id="buscar" placeholder="Buscar por nome, modelo ou tipo..." onkeyup="listarPedidos()" />
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Cliente</th><th>Telefone</th><th>Data</th>
                  <th>Peça</th><th>Modelo</th><th>Status</th><th>Ações</th>
                </tr>
              </thead>
              <tbody id="listaPedidos"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ===== ABA OS ===== -->
      <div id="aba-os" style="display:none">
        <div class="card">
          <h2>🛠️ Nova Ordem de Serviço</h2>
          <div class="form-grid">
            <div class="field"><label>Nome do cliente *</label><input id="os_nome" placeholder="Ex: Maria Costa" /></div>
            <div class="field"><label>Telefone / WhatsApp</label><input id="os_telefone" placeholder="(xx) 9xxxx-xxxx" /></div>
            <div class="field">
              <label>Equipamento</label>
              <select id="os_equipamento">
                <option>Impressora</option>
                <option>Notebook</option>
                <option>Computador</option>
                <option>Celular</option>
                <option>Tablet</option>
                <option>Monitor</option>
                <option>Outro</option>
              </select>
            </div>
            <div class="field" id="field-outro" style="display:none">
              <label>Especificar equipamento</label>
              <input id="os_outro" placeholder="Descreva o equipamento" />
            </div>
            <div class="field"><label>Problema relatado *</label><textarea id="os_problema" placeholder="Descreva o problema..."></textarea></div>
            <div class="field"><label>Acessórios entregues</label><textarea id="os_acessorios" placeholder="Carregador, case, etc..."></textarea></div>
            <div class="field"><label>Valor estimado (R$)</label><input id="os_valor" type="number" placeholder="0,00" step="0.01" min="0" /></div>
          </div>
          <div class="form-actions">
            <button onclick="salvarOS()">💾 Salvar Ordem</button>
            <button class="btn-secondary" onclick="limparFormOS()">✕ Limpar</button>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>📋 Ordens de Serviço</h2>
          </div>
          <div class="search-wrap">
            <input id="buscarOS" placeholder="Buscar por nome, equipamento ou problema..." onkeyup="listarOS()" />
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nº OS</th><th>Cliente</th><th>Telefone</th><th>Equipamento</th>
                  <th>Problema</th><th>Valor</th><th>Status</th><th>Ações</th>
                </tr>
              </thead>
              <tbody id="listaOS"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div><!-- /container -->

    <!-- MODAL EDITAR PEÇA -->
    <div class="modal-overlay" id="modalPeca">
      <div class="modal">
        <h3>✏️ Editar Pedido de Peça</h3>
        <div class="form-grid">
          <div class="field"><label>Nome do cliente *</label><input id="edit_nome" /></div>
          <div class="field"><label>Telefone</label><input id="edit_telefone" /></div>
          <div class="field"><label>Data</label><input id="edit_data" type="date" /></div>
          <div class="field"><label>Tipo da peça</label><input id="edit_tipo" /></div>
          <div class="field"><label>Modelo *</label><input id="edit_modelo" /></div>
          <div class="field">
            <label>Status</label>
            <select id="edit_status">
              <option value="Pedido realizado">Pedido realizado</option>
              <option value="Peça em trânsito">Peça em trânsito</option>
              <option value="Peça chegou">Peça chegou</option>
              <option value="Entregue ao cliente">Entregue ao cliente</option>
            </select>
          </div>
          <div class="field" style="grid-column:1/-1"><label>Observações</label><textarea id="edit_obs"></textarea></div>
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="fecharModal('modalPeca')">Cancelar</button>
          <button onclick="confirmarEdicaoPeca()">💾 Salvar</button>
        </div>
      </div>
    </div>

    <!-- MODAL EDITAR OS -->
    <div class="modal-overlay" id="modalOS">
      <div class="modal">
        <h3>✏️ Editar Ordem de Serviço</h3>
        <div class="form-grid">
          <div class="field"><label>Nome do cliente *</label><input id="eos_nome" /></div>
          <div class="field"><label>Telefone</label><input id="eos_telefone" /></div>
          <div class="field">
            <label>Equipamento</label>
            <select id="eos_equipamento">
              <option>Impressora</option><option>Notebook</option><option>Computador</option>
              <option>Celular</option><option>Tablet</option><option>Monitor</option><option>Outro</option>
            </select>
          </div>
          <div class="field"><label>Problema</label><textarea id="eos_problema"></textarea></div>
          <div class="field"><label>Acessórios</label><textarea id="eos_acessorios"></textarea></div>
          <div class="field"><label>Valor (R$)</label><input id="eos_valor" type="number" step="0.01" min="0" /></div>
          <div class="field">
            <label>Status</label>
            <select id="eos_status">
              <option>Aguardando</option><option>Em andamento</option><option>Pronto</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="fecharModal('modalOS')">Cancelar</button>
          <button onclick="confirmarEdicaoOS()">💾 Salvar</button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- PRINT AREA -->
    <div class="print-area" id="printArea" style="display:none"></div>

    <script src="script.js"></script>
  </body>
</html>
